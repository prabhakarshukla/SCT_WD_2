<!DOCTYPE html>
<html lang="en">
<head>
    <nav class="navbar">

            <h2>SkillCraft Technology Internship</h2>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Stopwatch</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">

        <h1>Stopwatch</h1>

        <div class="display">
            00:00:00
        </div>

        <div class="buttons">

            <button id="start">
                Start
            </button>

            <button id="pause">
                Pause
            </button>

            <button id="reset">
                Reset
            </button>

            <button id="lap">
                Lap
            </button>

        </div>

        <ul id="laps">

        </ul>

    </div>

<script src="script.js"></script>

</body>
